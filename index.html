<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <!-- ✅ ホーム画面アイコン名 -->
  <meta name="apple-mobile-web-app-title" content="NABE pool">

  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#111" />
  <!-- ✅ Safariタブ名 -->
  <title>NABE pool</title>

  <style>
    :root {
      font-family: -apple-system, system-ui, "Hiragino Sans", "Noto Sans JP", sans-serif;

      /* ✅ 端末に合わせて全体スケール（iPad/PCで小さくならない） */
      --ui: clamp(1, (100vw / 430), 1.35);
      --gap: calc(10px * var(--ui));
      --pad: calc(12px * var(--ui));
    }

    html {
      height:100%;
      background:#0b0b0c;
      overscroll-behavior:none;
      touch-action:manipulation;
      -webkit-text-size-adjust:100%;
    }

    body{
      position:fixed;
      inset:0;
      height:calc(var(--vh,1vh)*100);
      margin:0;
      overflow:hidden;
      background:#0b0b0c;
      color:#fff;
      -webkit-tap-highlight-color:transparent;

      padding-top:env(safe-area-inset-top);
      padding-bottom:env(safe-area-inset-bottom);
      padding-left:env(safe-area-inset-left);
      padding-right:env(safe-area-inset-right);
    }

    *{ -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; }
    input{ -webkit-user-select:text; user-select:text; -webkit-touch-callout:default; }

    header{
      padding: calc(10px * var(--ui)) var(--pad) calc(8px * var(--ui));
      position:sticky;
      top:0;
      background:linear-gradient(#0b0b0c, rgba(11,11,12,.78));
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(255,255,255,.06);
      padding-left:calc(var(--pad) + env(safe-area-inset-left));
      padding-right:calc(var(--pad) + env(safe-area-inset-right));
    }

    .topbar{ display:flex; align-items:center; justify-content:space-between; gap:calc(10px * var(--ui)); }

    /* ✅ アプリ内タイトル（統一） */
    h1{
      font-size:calc(14px * var(--ui));
      margin:0;
      opacity:.92;
      letter-spacing:.02em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    button{
      background:#1e1e24;
      color:#fff;
      border:1px solid #2a2a33;
      border-radius:12px;
      padding: calc(8px * var(--ui)) calc(10px * var(--ui));
      font-size:calc(13px * var(--ui));
      cursor:pointer;
    }
    button:active{ transform:translateY(1px); }
    button.danger{ border-color:#4a2a2a; }

    .inputs{
      margin-top:calc(8px * var(--ui));
      display:flex;
      gap:calc(8px * var(--ui));
      flex-wrap:nowrap;
      align-items:center;
      overflow:hidden;
    }

    input[type="text"], input[type="number"]{
      background:#141418;
      color:#fff;
      border:1px solid #2a2a33;
      border-radius:10px;
      padding: calc(7px * var(--ui)) calc(8px * var(--ui));
      font-size:calc(13px * var(--ui));
      outline:none;
      min-width:0;
    }
    input[type="text"]{ width:33%; }
    input[type="number"]{ width:12%; text-align:center; padding: calc(7px * var(--ui)) calc(6px * var(--ui)); }

    main{
      padding: calc(10px * var(--ui)) var(--pad) calc(14px * var(--ui));
      display:grid;
      gap: var(--gap);
      box-sizing:border-box;
      height:calc((var(--vh,1vh)*100) - calc(74px * var(--ui)));
      padding-left:calc(var(--pad) + env(safe-area-inset-left));
      padding-right:calc(var(--pad) + env(safe-area-inset-right));
      padding-bottom:calc(calc(14px * var(--ui)) + env(safe-area-inset-bottom));
    }

    /* 横画面は左右を少し詰めて面積確保 */
    @media (orientation: landscape) {
      :root { --ui: clamp(1, (100vw / 700), 1.25); }
      header { padding-left: calc(6px + env(safe-area-inset-left)); padding-right: calc(6px + env(safe-area-inset-right)); }
      main   { padding-left: calc(6px + env(safe-area-inset-left)); padding-right: calc(6px + env(safe-area-inset-right)); }
    }

    .cards{
      display:grid;
      grid-template-columns:1fr;
      gap: var(--gap);
      height:100%;
    }
    @media (min-width:720px){ .cards{ grid-template-columns:1fr 1fr; } }
    @media (orientation: landscape) and (min-width:720px) { .cards { gap:calc(6px * var(--ui)); } }

    .card{
      position:relative;
      background:#121216;
      border:1px solid #2a2a33;
      border-radius:18px;
      padding: calc(16px * var(--ui));
      height:100%;
      min-height: calc(260px * var(--ui));
      touch-action:manipulation;
      overflow:hidden;
      transform:translateZ(0);
    }

    .cardHeader{
      display:flex;
      justify-content:space-between;
      align-items:baseline;
      gap:calc(10px * var(--ui));
      position:relative;
      z-index:2;
    }

    /* ✅ iPadでも小さくならないよう拡大 */
    .playerName{
      font-size: calc(22px * var(--ui));
      font-weight:1000;
      opacity:.97;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-shadow:0 0 14px rgba(255,255,255,.14);
    }

    .metaRight{
      display:flex;
      gap:calc(10px * var(--ui));
      align-items:center;
      font-size: calc(14px * var(--ui));
      opacity:.96;
      white-space:nowrap;
    }

    .raceTag{
      font-weight:900;
      opacity:.92;
      text-shadow:0 0 12px rgba(255,255,255,.10);
    }

    .winsPill{
      display:inline-flex;
      align-items:center;
      gap:calc(6px * var(--ui));
      padding: calc(7px * var(--ui)) calc(11px * var(--ui));
      border-radius:999px;
      border:1px solid rgba(255,255,255,.22);
      background:rgba(255,255,255,.09);
      font-weight:1000;
      letter-spacing:.02em;
      box-shadow:0 0 16px rgba(255,255,255,.10);
    }

    .winsNum{
      font-size: calc(16px * var(--ui));
      text-shadow:0 0 16px rgba(255,255,255,.22);
    }

    /* ✅ スコアだけ中心寄り */
    .scoreWrap{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      padding-top: calc(25px * var(--ui));
      z-index:1;
      pointer-events:none;
    }

    /* ✅ iPad/PCでスコアが小さくならないよう上限を上げる */
    .score{
      font-size: clamp(calc(150px * var(--ui)), calc(20vw * var(--ui)), calc(320px * var(--ui)));
      font-weight:1000;
      letter-spacing:.01em;
      line-height:1;
      text-align:center;
      text-shadow:
        0 0 26px rgba(255,255,255,.25),
        0 0 80px rgba(255,255,255,.10);
      transform:translateZ(0);
    }

    .score.fxPlus{ animation: scorePop .22s ease-out, scoreGlow .55s ease-out; }
    .score.fxMinus{ animation: scoreShake .22s ease-out, scoreDim .55s ease-out; }

    @keyframes scorePop{
      0%{ transform:scale(1.00); }
      65%{ transform:scale(1.10); }
      100%{ transform:scale(1.00); }
    }
    @keyframes scoreGlow{
      0%{ filter: brightness(1) saturate(1); }
      50%{ filter: brightness(1.35) saturate(1.5); }
      100%{ filter: brightness(1) saturate(1); }
    }
    @keyframes scoreShake{
      0%{ transform:translateX(0) scale(1.00); }
      25%{ transform:translateX(-3px) scale(0.995); }
      50%{ transform:translateX(3px) scale(0.995); }
      75%{ transform:translateX(-2px) scale(0.995); }
      100%{ transform:translateX(0) scale(1.00); }
    }
    @keyframes scoreDim{
      0%{ filter: brightness(1) saturate(1); }
      50%{ filter: brightness(.85) saturate(.9); }
      100%{ filter: brightness(1) saturate(1); }
    }

    /* ===== WINNER ===== */
    .winnerOverlay{
      position:absolute; inset:0;
      display:none;
      place-items:center;
      pointer-events:none;
      background: radial-gradient(circle at 50% 45%, rgba(255,240,170,.26), rgba(0,0,0,0));
      z-index:3;
    }
    .winnerOverlay::before{
      content:"";
      position:absolute;
      inset:-55%;
      background:conic-gradient(
        from 0deg,
        rgba(255,0,120,.32),
        rgba(255,210,0,.28),
        rgba(0,255,170,.28),
        rgba(0,160,255,.28),
        rgba(180,0,255,.28),
        rgba(255,0,120,.32)
      );
      filter:blur(18px);
      animation: swirl .75s linear infinite;
      opacity:.95;
    }
    .winnerOverlay::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.22), rgba(255,255,255,0) 55%),
        radial-gradient(circle at 20% 30%, rgba(255,255,255,.15), transparent 42%),
        radial-gradient(circle at 80% 70%, rgba(255,255,255,.12), transparent 46%);
      mix-blend-mode:screen;
      animation: flash 520ms ease-in-out infinite;
      opacity:.75;
    }
    .winnerText{
      position:relative;
      max-width:min(92%, calc(520px * var(--ui)));
      text-align:center;
      white-space:nowrap;
      box-sizing:border-box;

      font-weight:1000;
      letter-spacing:.22em;
      font-size: clamp(calc(30px * var(--ui)), calc(6.4vw * var(--ui)), calc(62px * var(--ui)));

      padding:calc(16px * var(--ui)) calc(22px * var(--ui));
      border-radius:999px;
      border:3px solid rgba(255,255,255,.48);
      background: rgba(0,0,0,.30);

      text-shadow:
        0 0 22px rgba(255,255,255,.65),
        0 0 50px rgba(255,255,255,.28);

      box-shadow:
        0 0 28px rgba(255,255,255,.28),
        0 0 120px rgba(255,255,255,.14) inset;

      animation:
        winnerPop 540ms cubic-bezier(.2,1,.2,1) both,
        rainbow .90s linear 540ms infinite,
        heartbeat 650ms ease-in-out 540ms infinite,
        microJitterSlow 260ms ease-in-out 540ms infinite,
        strobe 1.15s steps(2,end) 540ms infinite;
    }

    @media (orientation: landscape) {
      .winnerText{
        font-size: clamp(calc(26px * var(--ui)), calc(4.8vw * var(--ui)), calc(46px * var(--ui)));
        padding: calc(14px * var(--ui)) calc(18px * var(--ui));
        letter-spacing: .18em;
        max-width: min(92%, calc(420px * var(--ui)));
      }
    }

    .card.win{
      animation:
        borderRainbow .90s linear infinite,
        microJitterSlow 240ms ease-in-out infinite,
        winKick 420ms ease-out both;
      box-shadow:
        0 0 0 2px rgba(255,255,255,.14) inset,
        0 0 52px rgba(255,255,255,.14);
    }
    .card.win .winnerOverlay{ display:grid; }

    @keyframes swirl { from{ transform:rotate(0deg);} to{ transform:rotate(360deg);} }
    @keyframes flash{
      0%{ opacity:.25; transform:scale(0.98); }
      50%{ opacity:.85; transform:scale(1.02); }
      100%{ opacity:.25; transform:scale(0.98); }
    }
    @keyframes winnerPop{
      0%{ transform:scale(.55) rotate(-2deg); opacity:0; filter:blur(2px); }
      60%{ transform:scale(1.16) rotate(1deg); opacity:1; filter:blur(0); }
      100%{ transform:scale(1.0) rotate(0deg); opacity:1; }
    }
    @keyframes rainbow{
      0%{ border-color: rgba(255,60,120,.78); color: rgba(255,70,130,1); }
      20%{ border-color: rgba(255,190,70,.78); color: rgba(255,220,90,1); }
      40%{ border-color: rgba(60,255,170,.78); color: rgba(90,255,190,1); }
      60%{ border-color: rgba(60,170,255,.78); color: rgba(110,200,255,1); }
      80%{ border-color: rgba(180,80,255,.78); color: rgba(220,150,255,1); }
      100%{ border-color: rgba(255,60,120,.78); color: rgba(255,70,130,1); }
    }
    @keyframes borderRainbow{
      0%{ border-color: rgba(255,60,120,.86); }
      20%{ border-color: rgba(255,190,70,.86); }
      40%{ border-color: rgba(60,255,170,.86); }
      60%{ border-color: rgba(60,170,255,.86); }
      80%{ border-color: rgba(180,80,255,.86); }
      100%{ border-color: rgba(255,60,120,.86); }
    }
    @keyframes microJitterSlow{
      0%{ transform: translate(0,0); }
      25%{ transform: translate(1px,0); }
      50%{ transform: translate(0,1px); }
      75%{ transform: translate(-1px,0); }
      100%{ transform: translate(0,0); }
    }
    @keyframes heartbeat{
      0%{ transform: scale(1); }
      20%{ transform: scale(1.03); }
      40%{ transform: scale(0.99); }
      60%{ transform: scale(1.05); }
      100%{ transform: scale(1); }
    }
    @keyframes strobe{
      0%{ filter: brightness(1.0) saturate(1.15); }
      100%{ filter: brightness(1.35) saturate(1.55); }
    }
    @keyframes winKick{
      0%{ transform: scale(1.00); }
      45%{ transform: scale(1.012); }
      100%{ transform: scale(1.00); }
    }

    .modalBack{
      position:fixed; inset:0;
      background:rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:9999;
    }
    .modal{
      width:min(520px, 100%);
      background:#121216;
      border:1px solid #2a2a33;
      border-radius:16px;
      padding:14px;
      box-shadow:0 10px 40px rgba(0,0,0,.45);
    }
    .modalTitle{ margin:0 0 10px; font-size:14px; opacity:.92; }
    .modalBtns{ display:grid; gap:10px; }
    .modalBtns button{ width:100%; padding:12px; font-size:14px; border-radius:14px; }
    .modalBtns .subtle{ background:#17171d; }
  </style>
</head>

<body>
  <header>
    <div class="topbar">
      <h1>NABE pool</h1>
      <div style="display:flex; gap:8px; align-items:center;">
        <button id="share">Share</button>
        <button id="reset" class="danger">Reset</button>
      </div>
    </div>

    <div class="inputs">
      <input id="p1Name" type="text" placeholder="P1 name" />
      <input id="raceTo1" type="number" inputmode="numeric" min="1" max="99" />
      <input id="p2Name" type="text" placeholder="P2 name" />
      <input id="raceTo2" type="number" inputmode="numeric" min="1" max="99" />
    </div>
  </header>

  <main>
    <section class="cards">
      <div class="card" id="card1" role="button" aria-label="Player 1 score board">
        <div class="cardHeader">
          <div class="playerName" id="p1Label">Player 1</div>
          <div class="metaRight">
            <span class="raceTag">Race <span id="raceDisp1">05</span></span>
            <span class="winsPill">W <span class="winsNum" id="p1Wins">0</span></span>
          </div>
        </div>

        <div class="scoreWrap">
          <div class="score" id="p1Score">0</div>
        </div>

        <div class="winnerOverlay"><div class="winnerText">WINNER!!!</div></div>
      </div>

      <div class="card" id="card2" role="button" aria-label="Player 2 score board">
        <div class="cardHeader">
          <div class="playerName" id="p2Label">Player 2</div>
          <div class="metaRight">
            <span class="raceTag">Race <span id="raceDisp2">05</span></span>
            <span class="winsPill">W <span class="winsNum" id="p2Wins">0</span></span>
          </div>
        </div>

        <div class="scoreWrap">
          <div class="score" id="p2Score">0</div>
        </div>

        <div class="winnerOverlay"><div class="winnerText">WINNER!!!</div></div>
      </div>
    </section>
  </main>

  <div class="modalBack" id="modalBack" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true">
      <p class="modalTitle">Reset</p>
      <div class="modalBtns">
        <button class="subtle" id="btnScoreReset">Score reset</button>
        <button class="subtle" id="btnScoreWinsReset">Wins + Score reset</button>
        <button class="danger" id="btnAllReset">All reset</button>
        <button id="btnCancel">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    function setVh() {
      const vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty("--vh", `${vh}px`);
    }
    setVh();
    window.addEventListener("resize", setVh);
    window.addEventListener("orientationchange", setVh);

    // ✅ iOSズームジェスチャー抑止
    ["gesturestart","gesturechange","gestureend"].forEach(ev => {
      document.addEventListener(ev, e => e.preventDefault(), { passive:false });
    });

    // ✅ “余白タップで上下に動く”対策：入力以外のtouchstart/touchmoveを止める
    const isEditable = (t) => t && (t.tagName === "INPUT" || t.tagName === "TEXTAREA" || t.isContentEditable);
    document.addEventListener("touchstart", (e) => {
      if (!isEditable(e.target)) e.preventDefault();
    }, { passive:false });

    document.addEventListener("touchmove", (e) => {
      if (!isEditable(e.target)) e.preventDefault();
    }, { passive:false });

    const $ = (id) => document.getElementById(id);
    const KEY = "nabe_pool_v1";

    const state = {
      raceTo1: 5,
      raceTo2: 5,
      winner: 0,
      p1: { name: "Player 1", score: 0, wins: 0 },
      p2: { name: "Player 2", score: 0, wins: 0 },
    };

    function load() {
      try {
        const raw = localStorage.getItem(KEY);
        if (!raw) return;
        const s = JSON.parse(raw);
        if (!s) return;
        if (typeof s.raceTo1 === "number") state.raceTo1 = s.raceTo1;
        if (typeof s.raceTo2 === "number") state.raceTo2 = s.raceTo2;
        if (typeof s.winner === "number") state.winner = s.winner;
        if (s.p1) state.p1 = { ...state.p1, ...s.p1 };
        if (s.p2) state.p2 = { ...state.p2, ...s.p2 };
      } catch (e) {}
    }
    function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

    function clampRace(v) {
      if (!Number.isFinite(v)) return 5;
      v = Math.round(v);
      return Math.min(99, Math.max(1, v));
    }
    function clampScore(v) { return Math.max(0, v); }
    const pad2 = (n) => String(n).padStart(2, "0");

    function scoreFx(player, delta){
      const el = $(player === 1 ? "p1Score" : "p2Score");
      el.classList.remove("fxPlus","fxMinus");
      void el.offsetWidth;
      el.classList.add(delta >= 0 ? "fxPlus" : "fxMinus");
      setTimeout(()=> el.classList.remove("fxPlus","fxMinus"), 650);
    }

    function render() {
      $("p1Label").textContent = state.p1.name || "Player 1";
      $("p2Label").textContent = state.p2.name || "Player 2";
      $("p1Score").textContent = state.p1.score;
      $("p2Score").textContent = state.p2.score;

      $("p1Wins").textContent = state.p1.wins;
      $("p2Wins").textContent = state.p2.wins;

      $("p1Name").value = (state.p1.name === "Player 1") ? "" : state.p1.name;
      $("p2Name").value = (state.p2.name === "Player 2") ? "" : state.p2.name;

      const r1 = clampRace(state.raceTo1);
      const r2 = clampRace(state.raceTo2);
      $("raceTo1").value = pad2(r1);
      $("raceTo2").value = pad2(r2);
      $("raceDisp1").textContent = pad2(r1);
      $("raceDisp2").textContent = pad2(r2);

      $("card1").classList.toggle("win", state.winner === 1);
      $("card2").classList.toggle("win", state.winner === 2);
    }

    function setNamesFromInputs() {
      const n1 = $("p1Name").value.trim();
      const n2 = $("p2Name").value.trim();
      if (n1) state.p1.name = n1;
      if (n2) state.p2.name = n2;
      save(); render();
    }

    function setRacesFromInputs() {
      const v1 = $("raceTo1").value.trim();
      const v2 = $("raceTo2").value.trim();
      state.raceTo1 = clampRace(v1 === "" ? 5 : Number(v1));
      state.raceTo2 = clampRace(v2 === "" ? 5 : Number(v2));
      checkWinner();
      save(); render();
    }

    function checkWinner() {
      if (state.winner) return;
      const r1 = clampRace(state.raceTo1);
      const r2 = clampRace(state.raceTo2);
      if (state.p1.score >= r1) state.winner = 1;
      else if (state.p2.score >= r2) state.winner = 2;
      if (state.winner) save();
    }

    function addScore(player, delta) {
      if (state.winner) return;
      const key = (player === 1) ? "p1" : "p2";
      const prev = state[key].score;
      state[key].score = clampScore(state[key].score + delta);
      if (state[key].score !== prev) scoreFx(player, delta);
      checkWinner();
      save(); render();
    }

    function cancelWinAndAdjust(player, delta) {
      if (!state.winner) return;
      state.winner = 0;
      const key = (player === 1) ? "p1" : "p2";
      const prev = state[key].score;
      state[key].score = clampScore(state[key].score + delta);
      if (state[key].score !== prev) scoreFx(player, delta);
      checkWinner();
      save(); render();
    }

    function nextGame() {
      if (!state.winner) return false;
      if (state.winner === 1) state.p1.wins += 1;
      if (state.winner === 2) state.p2.wins += 1;
      state.p1.score = 0;
      state.p2.score = 0;
      state.winner = 0;
      save(); render();
      return true;
    }

    function openModal() { $("modalBack").style.display = "flex"; $("modalBack").setAttribute("aria-hidden", "false"); }
    function closeModal() { $("modalBack").style.display = "none"; $("modalBack").setAttribute("aria-hidden", "true"); }

    function resetScoreOnly() { state.p1.score=0; state.p2.score=0; state.winner=0; save(); render(); }
    function resetScoreAndWins() { resetScoreOnly(); state.p1.wins=0; state.p2.wins=0; save(); render(); }
    function resetAll() {
      state.p1 = { name:"Player 1", score:0, wins:0 };
      state.p2 = { name:"Player 2", score:0, wins:0 };
      state.raceTo1 = 5; state.raceTo2 = 5;
      state.winner = 0;
      save(); render();
    }

    async function shareUrl() {
      const url = location.href;
      const msg =
        "NABE pool\n" +
        "Open and add to Home Screen 🎱\n\n" +
        url;

      try {
        if (navigator.share) {
          await navigator.share({ title: "NABE pool", text: msg });
        } else {
          await navigator.clipboard.writeText(msg);
          alert("Copied!");
        }
      } catch (e) {
        prompt("Copy this", msg);
      }
    }

    function attachGesture(cardEl, player) {
      const TH = 25, TAP_MAX = 10;
      let sx=0, sy=0, ex=0, ey=0;
      let touching=false;
      let lastTouchAt = 0;

      function onStart(e){
        if (e.touches && e.touches.length > 1) return;
        touching = true;
        const t = e.touches ? e.touches[0] : e;
        sx=t.clientX; sy=t.clientY; ex=sx; ey=sy;
      }
      function onMove(e){
        if(!touching) return;
        const t = e.touches ? e.touches[0] : e;
        ex=t.clientX; ey=t.clientY;
      }
      function onEnd(){
        if(!touching) return;
        touching=false;
        lastTouchAt = Date.now();

        const dx = ex - sx;
        const dy = ey - sy;
        const isTap = (Math.abs(dx) <= TAP_MAX && Math.abs(dy) <= TAP_MAX);

        if (state.winner) {
          if (isTap) { nextGame(); return; }
          const isH = Math.abs(dx) > Math.abs(dy);
          if (isH) {
            if (dx >= TH) { nextGame(); return; }
            if (dx <= -TH) { cancelWinAndAdjust(player, -1); return; }
          } else {
            if (dy <= -TH) { nextGame(); return; }
            if (dy >= TH) { cancelWinAndAdjust(player, -1); return; }
          }
          return;
        }

        if (isTap) { addScore(player, +1); return; }

        const isH = Math.abs(dx) > Math.abs(dy);
        if (isH) {
          if (dx >= TH) addScore(player, +1);
          else if (dx <= -TH) addScore(player, -1);
        } else {
          if (dy <= -TH) addScore(player, +1);
          else if (dy >= TH) addScore(player, -1);
        }
      }

      cardEl.addEventListener("touchstart", onStart, { passive:true });
      cardEl.addEventListener("touchmove", onMove, { passive:true });
      cardEl.addEventListener("touchend", onEnd, { passive:true });

      cardEl.addEventListener("click", () => {
        if (Date.now() - lastTouchAt < 650) return;
        if (state.winner) nextGame();
        else addScore(player, +1);
      });
    }

    // wire
    load();
    render();

    $("share").addEventListener("click", shareUrl);
    $("reset").addEventListener("click", openModal);

    $("btnScoreReset").addEventListener("click", () => { resetScoreOnly(); closeModal(); });
    $("btnScoreWinsReset").addEventListener("click", () => { resetScoreAndWins(); closeModal(); });
    $("btnAllReset").addEventListener("click", () => { resetAll(); closeModal(); });
    $("btnCancel").addEventListener("click", closeModal);
    $("modalBack").addEventListener("click", (e) => { if (e.target === $("modalBack")) closeModal(); });

    $("p1Name").addEventListener("keydown", (e)=>{ if(e.key==="Enter"){ e.preventDefault(); setNamesFromInputs(); $("p1Name").blur(); }});
    $("p2Name").addEventListener("keydown", (e)=>{ if(e.key==="Enter"){ e.preventDefault(); setNamesFromInputs(); $("p2Name").blur(); }});
    $("p1Name").addEventListener("blur", setNamesFromInputs);
    $("p2Name").addEventListener("blur", setNamesFromInputs);

    function clearOnTouch(e){ e.target.value = ""; }
    ["raceTo1","raceTo2"].forEach(id=>{
      const el = $(id);
      el.addEventListener("focus", clearOnTouch);
      el.addEventListener("touchstart", clearOnTouch, { passive:true });
      el.addEventListener("keydown", (e)=>{
        if(e.key==="Enter"){
          e.preventDefault();
          setRacesFromInputs();
          el.blur();
        }
      });
      el.addEventListener("blur", setRacesFromInputs);
    });

    attachGesture($("card1"), 1);
    attachGesture($("card2"), 2);
  </script>
</body>
</html>
