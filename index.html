<!doctype html>
<html lang="ja">
<head>
  <!-- ✅ iOSホーム画面アイコン（180px推奨） -->
 
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">

  <!-- ✅ iOSで「ホーム画面に追加」したときにアプリっぽく動かす設定 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!-- ✅ ステータスバーを黒の半透明に（背景と馴染ませる） -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <!-- ✅ ホーム画面に表示されるアプリ名 -->
  <meta name="apple-mobile-web-app-title" content="ビリヤード スコア">

  <meta charset="utf-8" />

  <!-- ✅ 重要：iPhoneのノッチ/セーフエリアを使えるようにする -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <meta name="theme-color" content="#111" />
  <title>ビリヤード スコア</title>

  <style>
    /* =========================
       基本デザイン（元の見た目）
    ========================= */
    :root {
      font-family: -apple-system, system-ui, "Hiragino Sans", "Noto Sans JP", sans-serif;
    }

    header {
      /* ✅ stickyは残す（スクロールさせない場合でも害はほぼ無い） */
      padding: 16px 16px 8px;
      position: sticky;
      top: 0;
      background: linear-gradient(#0b0b0c, rgba(11,11,12,.7));
      backdrop-filter: blur(8px);
      /* ✅ セーフエリア左右を加味（横向きでノッチに被りにくくする） */
      padding-left: calc(16px + env(safe-area-inset-left));
      padding-right: calc(16px + env(safe-area-inset-right));
    }

    h1 {
      font-size: 18px;
      margin: 0 0 10px;
      opacity: .9;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    input[type="text"] {
      background: #16161a;
      color: #fff;
      border: 1px solid #2a2a33;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 16px;
      width: 170px;
      outline: none;
    }

    button {
      background: #1e1e24;
      color: #fff;
      border: 1px solid #2a2a33;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 15px;
      cursor: pointer;
    }

    button:active { transform: translateY(1px); }

    main {
      padding: 14px 16px 24px;
      display: grid;
      gap: 14px;
      /* ✅ セーフエリア左右を加味（横向きでノッチに被りにくくする） */
      padding-left: calc(16px + env(safe-area-inset-left));
      padding-right: calc(16px + env(safe-area-inset-right));
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
    }

    .cards { display: grid; grid-template-columns: 1fr; gap: 14px; }
    @media (min-width: 720px) { .cards { grid-template-columns: 1fr 1fr; } }

    .card {
      background: #121216;
      border: 1px solid #2a2a33;
      border-radius: 16px;
      padding: 14px;
    }

    .name {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }

    .name strong { font-size: 18px; }
    .name small { opacity: .7; }

    .score {
      font-size: 56px;
      font-weight: 800;
      letter-spacing: 1px;
      margin: 10px 0 12px;
    }

    .btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .btns button { padding: 12px 8px; font-size: 16px; }

    .hint { opacity: .75; font-size: 13px; line-height: 1.5; }

    /* ✅ 勝者表示（border色を変える） */
    button.danger { border-color: #4a2a2a; }
    .card.danger { border-color: #4a2a2a; }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      border: 1px solid #2a2a33;
      border-radius: 999px;
      font-size: 12px;
      opacity: .85;
    }

    .footer { opacity: .6; font-size: 12px; padding-top: 10px; }

    /* =========================
       ✅ 追加：iOSのヌルヌル/スワイプ/バウンスを無効化して「固定」にする
       ※ これが“全て固定”のメイン設定
    ========================= */

    /* ✅ スクロール自体を禁止（画面が動かなくなる） */
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      overflow: hidden;                 /* スクロール禁止 */
      overscroll-behavior: none;        /* バウンス抑制（対応環境で効く） */
      -webkit-text-size-adjust: 100%;   /* iOSの文字サイズ自動調整を抑える */
    }

    body {
      background: #0b0b0c;
      color: #fff;

      /* ✅ タップ時の青いハイライトを消す（見た目がアプリっぽくなる） */
      -webkit-tap-highlight-color: transparent;

      /* ✅ ノッチ（セーフエリア）回避：上下＋左右
         横向きのとき、左右の切り欠きに被るのを防ぐ */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    /* =========================
       ✅ 追加：ダブルタップ拡大（ズーム）を抑制
       ※ “上下バーが出ない”の改善にも寄与することが多い
    ========================= */
    html, body { touch-action: manipulation; }
    button, input, .card, header, main { touch-action: manipulation; }
  </style>
</head>

<body>
  <header>
    <h1>🎱 ビリヤード スコア（2人用）</h1>
    <div class="row">
      <span class="pill" id="modePill">モード: 10点先取</span>
      <button id="toggleMode">モード切替</button>
      <button id="resetAll" class="danger">全リセット</button>
      <button id="share">URL共有</button>
    </div>
  </header>

  <main>
    <div class="row">
      <input id="p1Name" type="text" placeholder="プレイヤー1名" />
      <input id="p2Name" type="text" placeholder="プレイヤー2名" />
      <button id="saveNames">名前保存</button>
    </div>

    <section class="cards">
      <div class="card" id="card1">
        <div class="name"><strong id="p1Label">Player 1</strong><small>±1 / ±2</small></div>
        <div class="score" id="p1Score">0</div>
        <div class="btns">
          <button data-p="1" data-d="-2">-2</button>
          <button data-p="1" data-d="-1">-1</button>
          <button data-p="1" data-d="1">+1</button>
          <button data-p="1" data-d="2">+2</button>
        </div>
      </div>

      <div class="card" id="card2">
        <div class="name"><strong id="p2Label">Player 2</strong><small>±1 / ±2</small></div>
        <div class="score" id="p2Score">0</div>
        <div class="btns">
          <button data-p="2" data-d="-2">-2</button>
          <button data-p="2" data-d="-1">-1</button>
          <button data-p="2" data-d="1">+1</button>
          <button data-p="2" data-d="2">+2</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    // =========================
    // 基本処理（元のロジック）
    // =========================
    const $ = (id) => document.getElementById(id);

    // state
    const state = {
      target: 10,        // 10点先取 or 無制限（target=null扱い）
      unlimited: false,
      p1: { name: "Player 1", score: 0 },
      p2: { name: "Player 2", score: 0 },
    };

    // load/save (localStorage)
    const KEY = "billiard_score_v1";
    function load() {
      try {
        const raw = localStorage.getItem(KEY);
        if (!raw) return;
        const s = JSON.parse(raw);
        if (!s) return;
        Object.assign(state, s);
      } catch (e) {}
    }
    function save() {
      localStorage.setItem(KEY, JSON.stringify(state));
    }

    function clampScore(v) {
      // マイナスは0まで（好みで変更OK）
      return Math.max(0, v);
    }

    function render() {
      $("p1Label").textContent = state.p1.name || "Player 1";
      $("p2Label").textContent = state.p2.name || "Player 2";
      $("p1Score").textContent = state.p1.score;
      $("p2Score").textContent = state.p2.score;

      $("p1Name").value = state.p1.name === "Player 1" ? "" : state.p1.name;
      $("p2Name").value = state.p2.name === "Player 2" ? "" : state.p2.name;

      const pill = state.unlimited ? "モード: 無制限" : `モード: ${state.target}点先取`;
      $("modePill").textContent = pill;

      // 勝者表示（先取モードのみ）
      $("card1").classList.remove("danger");
      $("card2").classList.remove("danger");
      if (!state.unlimited) {
        if (state.p1.score >= state.target && state.p1.score > state.p2.score) $("card1").classList.add("danger");
        if (state.p2.score >= state.target && state.p2.score > state.p1.score) $("card2").classList.add("danger");
      }
    }

    function setNames() {
      const n1 = $("p1Name").value.trim();
      const n2 = $("p2Name").value.trim();
      if (n1) state.p1.name = n1;
      if (n2) state.p2.name = n2;
      save(); render();
    }

    function addScore(player, delta) {
      const key = player === 1 ? "p1" : "p2";
      state[key].score = clampScore(state[key].score + delta);
      save(); render();
    }

    function resetAll() {
      if (!confirm("スコアと名前を全部リセットする？")) return;
      state.p1 = { name: "Player 1", score: 0 };
      state.p2 = { name: "Player 2", score: 0 };
      state.target = 10;
      state.unlimited = false;
      save(); render();
    }

    function toggleMode() {
      // 10点先取 ↔ 無制限
      state.unlimited = !state.unlimited;
      save(); render();
    }

    async function shareUrl() {
      const url = location.href;
      try {
        if (navigator.share) {
          await navigator.share({ title: "ビリヤード スコア", url });
        } else {
          await navigator.clipboard.writeText(url);
          alert("URLをコピーしたよ");
        }
      } catch (e) {
        // fallback
        prompt("このURLをコピーして共有してね", url);
      }
    }

    // wire
    load();
    render();

    document.addEventListener("click", (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;

      if (btn.dataset && btn.dataset.p) {
        const p = Number(btn.dataset.p);
        const d = Number(btn.dataset.d);
        addScore(p, d);
      }
    });

    $("saveNames").addEventListener("click", setNames);
    $("resetAll").addEventListener("click", resetAll);
    $("toggleMode").addEventListener("click", toggleMode);
    $("share").addEventListener("click", shareUrl);

    // Enterで名前保存
    $("p1Name").addEventListener("keydown", (e) => { if (e.key === "Enter") setNames(); });
    $("p2Name").addEventListener("keydown", (e) => { if (e.key === "Enter") setNames(); });

    // =========================
    // ✅ 追加：iOSの「スワイプで画面がヌルヌル動く」挙動を強制停止
    // - touchmove を preventDefault してスクロール/慣性/バウンスを止める
    // - ただし INPUT/textarea 等の編集操作は邪魔しない（例外処理）
    // =========================
    document.addEventListener('touchmove', (e) => {
      const t = e.target;
      const isEditable =
        t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable);

      if (!isEditable) e.preventDefault();
    }, { passive: false });
  </script>
</body>
</html>
