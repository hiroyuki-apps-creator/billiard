

<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ビリヤード スコア">
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#111" />
  <title>ビリヤード スコア</title>

  <style>
    :root { font-family: -apple-system, system-ui, "Hiragino Sans", "Noto Sans JP", sans-serif; }

    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
      background: #0b0b0c;
      color: #fff;
      touch-action: manipulation;
    }

    body {
      -webkit-tap-highlight-color: transparent;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
    input { -webkit-user-select: text; user-select: text; -webkit-touch-callout: default; }

    header {
      padding: 16px 16px 10px;
      position: sticky;
      top: 0;
      background: linear-gradient(#0b0b0c, rgba(11,11,12,.7));
      backdrop-filter: blur(8px);
      padding-left: calc(16px + env(safe-area-inset-left));
      padding-right: calc(16px + env(safe-area-inset-right));
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    h1 { font-size: 18px; margin: 0 0 10px; opacity: .92; }

    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border: 1px solid #2a2a33;
      border-radius: 999px;
      font-size: 12px;
      opacity: .9;
      background: rgba(255,255,255,.02);
      white-space: nowrap;
    }

    input[type="text"], input[type="number"] {
      background: #16161a;
      color: #fff;
      border: 1px solid #2a2a33;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 16px;
      outline: none;
    }

    input[type="text"] { width: 170px; }
    input[type="number"] { width: 92px; text-align: center; }

    button {
      background: #1e1e24;
      color: #fff;
      border: 1px solid #2a2a33;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 15px;
      cursor: pointer;
    }
    button:active { transform: translateY(1px); }
    button.danger { border-color: #4a2a2a; }

    main {
      padding: 14px 16px 24px;
      display: grid;
      gap: 14px;
      padding-left: calc(16px + env(safe-area-inset-left));
      padding-right: calc(16px + env(safe-area-inset-right));
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
    }

    .cards { display: grid; grid-template-columns: 1fr; gap: 14px; }
    @media (min-width: 720px) { .cards { grid-template-columns: 1fr 1fr; } }

    .card {
      background: #121216;
      border: 1px solid #2a2a33;
      border-radius: 16px;
      padding: 14px;
      touch-action: manipulation;
    }

    .name {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .name strong { font-size: 18px; }
    .meta { display: flex; gap: 8px; align-items: center; opacity: .85; font-size: 12px; }

    .scoreLine { display: grid; gap: 6px; margin-top: 6px; }
    .score {
      font-size: 64px;
      font-weight: 900;
      letter-spacing: 1px;
      line-height: 1.0;
      margin: 0;
    }

    .winnerBadge {
      display: inline-block;
      font-size: 12px;
      letter-spacing: .12em;
      font-weight: 800;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.20);
      background: rgba(255,255,255,.06);
      opacity: .95;
      width: fit-content;
    }

    .card.win {
      border-color: rgba(255, 220, 120, .55);
      box-shadow: 0 0 0 2px rgba(255, 220, 120, .10) inset;
    }

    .hint {
      opacity: .72;
      font-size: 12px;
      line-height: 1.5;
      margin-top: 6px;
    }
  </style>
</head>

<body>
  <header>
    <h1>🎱 ビリヤード スコア（2人用）</h1>

    <div class="row">
      <input id="p1Name" type="text" placeholder="プレイヤー1名" />
      <input id="p2Name" type="text" placeholder="プレイヤー2名" />

      <span class="pill">P1 Race to
        <input id="raceTo1" type="number" inputmode="numeric" min="1" max="99" placeholder="10" />
      </span>

      <span class="pill">P2 Race to
        <input id="raceTo2" type="number" inputmode="numeric" min="1" max="99" placeholder="10" />
      </span>

      <button id="reset" class="danger">リセット</button>
      <button id="share">URL共有</button>
    </div>

    <div class="row" style="margin-top:10px;">
      <span class="pill">累計：<span id="p1Wins">0</span> - <span id="p2Wins">0</span></span>
      <span class="pill">操作：タップ/↑/→ +1　←/↓ -1</span>
      <span class="pill">勝利後：タップで次ゲームへ</span>
    </div>
  </header>

  <main>
    <section class="cards">
      <div class="card" id="card1" role="button" aria-label="Player 1 score board">
        <div class="name">
          <strong id="p1Label">Player 1</strong>
          <div class="meta">Race <span id="raceDisp1">10</span></div>
        </div>
        <div class="scoreLine">
          <div class="score" id="p1Score">0</div>
          <div class="winnerBadge" id="p1Winner" style="display:none;">WINNER!</div>
        </div>
        <div class="hint">タップ/↑/→で+1　←/↓で-1</div>
      </div>

      <div class="card" id="card2" role="button" aria-label="Player 2 score board">
        <div class="name">
          <strong id="p2Label">Player 2</strong>
          <div class="meta">Race <span id="raceDisp2">10</span></div>
        </div>
        <div class="scoreLine">
          <div class="score" id="p2Score">0</div>
          <div class="winnerBadge" id="p2Winner" style="display:none;">WINNER!</div>
        </div>
        <div class="hint">タップ/↑/→で+1　←/↓で-1</div>
      </div>
    </section>
  </main>

  <script>
    ["gesturestart","gesturechange","gestureend"].forEach(ev => {
      document.addEventListener(ev, e => e.preventDefault(), { passive:false });
    });

    const $ = (id) => document.getElementById(id);

    const KEY = "billiard_score_v3";
    const state = {
      raceTo1: 10,
      raceTo2: 10,
      winner: 0, // 0 / 1 / 2
      p1: { name: "Player 1", score: 0, wins: 0 },
      p2: { name: "Player 2", score: 0, wins: 0 },
    };

    function load() {
      try {
        const raw = localStorage.getItem(KEY);
        if (!raw) return;
        const s = JSON.parse(raw);
        if (!s) return;

        if (typeof s.raceTo1 === "number") state.raceTo1 = s.raceTo1;
        if (typeof s.raceTo2 === "number") state.raceTo2 = s.raceTo2;
        if (typeof s.winner === "number") state.winner = s.winner;

        if (s.p1) state.p1 = { ...state.p1, ...s.p1 };
        if (s.p2) state.p2 = { ...state.p2, ...s.p2 };
      } catch (e) {}
    }
    function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

    function clampRace(v) {
      if (!Number.isFinite(v)) return 10;
      v = Math.round(v);
      return Math.min(99, Math.max(1, v));
    }
    function clampScore(v) { return Math.max(0, v); }

    function render() {
      $("p1Label").textContent = state.p1.name || "Player 1";
      $("p2Label").textContent = state.p2.name || "Player 2";
      $("p1Score").textContent = state.p1.score;
      $("p2Score").textContent = state.p2.score;

      $("p1Wins").textContent = state.p1.wins;
      $("p2Wins").textContent = state.p2.wins;

      $("p1Name").value = (state.p1.name === "Player 1") ? "" : state.p1.name;
      $("p2Name").value = (state.p2.name === "Player 2") ? "" : state.p2.name;

      const r1 = clampRace(state.raceTo1);
      const r2 = clampRace(state.raceTo2);

      $("raceTo1").value = String(r1).padStart(2, "0");
      $("raceTo2").value = String(r2).padStart(2, "0");
      $("raceDisp1").textContent = String(r1).padStart(2, "0");
      $("raceDisp2").textContent = String(r2).padStart(2, "0");

      $("p1Winner").style.display = (state.winner === 1) ? "inline-block" : "none";
      $("p2Winner").style.display = (state.winner === 2) ? "inline-block" : "none";
      $("card1").classList.toggle("win", state.winner === 1);
      $("card2").classList.toggle("win", state.winner === 2);
    }

    function setNamesFromInputs() {
      const n1 = $("p1Name").value.trim();
      const n2 = $("p2Name").value.trim();
      if (n1) state.p1.name = n1;
      if (n2) state.p2.name = n2;
      save(); render();
    }

    function setRacesFromInputs() {
      state.raceTo1 = clampRace(Number($("raceTo1").value));
      state.raceTo2 = clampRace(Number($("raceTo2").value));

      // 表示をゼロ埋め
      $("raceTo1").value = String(state.raceTo1).padStart(2, "0");
      $("raceTo2").value = String(state.raceTo2).padStart(2, "0");

      // race変更で勝敗条件が変わるので再チェック
      checkWinner();
      save(); render();
    }

    function checkWinner() {
      if (state.winner) return;

      const r1 = clampRace(state.raceTo1);
      const r2 = clampRace(state.raceTo2);

      if (state.p1.score >= r1) state.winner = 1;
      else if (state.p2.score >= r2) state.winner = 2;

      if (state.winner) save();
    }

    function addScore(player, delta) {
      if (state.winner) return;

      const key = (player === 1) ? "p1" : "p2";
      state[key].score = clampScore(state[key].score + delta);

      checkWinner();
      save(); render();
    }

    function nextGameIfWinnerExists() {
      if (!state.winner) return false;

      if (state.winner === 1) state.p1.wins += 1;
      if (state.winner === 2) state.p2.wins += 1;

      state.p1.score = 0;
      state.p2.score = 0;
      state.winner = 0;

      save(); render();
      return true;
    }

    function resetFlow() {
      const choice = prompt(
        "リセット内容を選んでね:\n" +
        "1 = 進行中スコアだけ 0-0 に戻す（名前/累計/Raceは残す）\n" +
        "2 = スコア + 累計勝利数もリセット（名前/Raceは残す）\n" +
        "その他 = キャンセル"
      );

      if (choice !== "1" && choice !== "2") return;

      state.p1.score = 0;
      state.p2.score = 0;
      state.winner = 0;

      if (choice === "2") {
        state.p1.wins = 0;
        state.p2.wins = 0;
      }

      save(); render();
    }

    async function shareUrl() {
      const url = location.href;
      const msg =
        "ビリヤードスコア（2人用）\n" +
        "このURLを開いたら、共有ボタンから「ホーム画面に追加」して使ってね 🎱\n\n" +
        url;

      try {
        if (navigator.share) {
          await navigator.share({ title: "ビリヤード スコア", text: msg });
        } else {
          await navigator.clipboard.writeText(msg);
          alert("URL＋使い方をコピーしたよ");
        }
      } catch (e) {
        prompt("この文章をコピーして共有してね", msg);
      }
    }

    function attachGesture(cardEl, player) {
      const TH = 25;
      const TAP_MAX = 10;

      let sx = 0, sy = 0, ex = 0, ey = 0;
      let touching = false;

      function onStart(e) {
        if (e.touches && e.touches.length > 1) return;
        touching = true;
        const t = e.touches ? e.touches[0] : e;
        sx = t.clientX; sy = t.clientY;
        ex = sx; ey = sy;
      }

      function onMove(e) {
        if (!touching) return;
        const t = e.touches ? e.touches[0] : e;
        ex = t.clientX; ey = t.clientY;
      }

      function onEnd() {
        if (!touching) return;
        touching = false;

        const dx = ex - sx;
        const dy = ey - sy;

        if (state.winner) {
          if (Math.abs(dx) <= TAP_MAX && Math.abs(dy) <= TAP_MAX) nextGameIfWinnerExists();
          return;
        }

        if (Math.abs(dx) <= TAP_MAX && Math.abs(dy) <= TAP_MAX) {
          addScore(player, +1);
          return;
        }

        if (Math.abs(dx) > Math.abs(dy)) {
          if (dx >= TH) addScore(player, +1);
          else if (dx <= -TH) addScore(player, -1);
        } else {
          if (dy <= -TH) addScore(player, +1);
          else if (dy >= TH) addScore(player, -1);
        }
      }

      cardEl.addEventListener("touchstart", onStart, { passive: true });
      cardEl.addEventListener("touchmove", onMove, { passive: true });
      cardEl.addEventListener("touchend", onEnd, { passive: true });

      cardEl.addEventListener("click", () => {
        if (state.winner) nextGameIfWinnerExists();
        else addScore(player, +1);
      });
    }

    // スクロール/バウンス停止（入力中は邪魔しない）
    document.addEventListener("touchmove", (e) => {
      const t = e.target;
      const isEditable = t && (t.tagName === "INPUT" || t.tagName === "TEXTAREA" || t.isContentEditable);
      if (!isEditable) e.preventDefault();
    }, { passive: false });

    // ===== wire =====
    load();
    render();

    $("p1Name").addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); setNamesFromInputs(); }});
    $("p2Name").addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); setNamesFromInputs(); }});
    $("p1Name").addEventListener("blur", setNamesFromInputs);
    $("p2Name").addEventListener("blur", setNamesFromInputs);

    // Race：blur/Enter で保存＆ゼロ埋め
    ["raceTo1","raceTo2"].forEach(id => {
      $(id).addEventListener("keydown", (e) => {
        if (e.key === "Enter") { e.preventDefault(); setRacesFromInputs(); $(id).blur(); }
      });
      $(id).addEventListener("blur", setRacesFromInputs);
    });

    $("reset").addEventListener("click", resetFlow);
    $("share").addEventListener("click", shareUrl);

    attachGesture($("card1"), 1);
    attachGesture($("card2"), 2);
  </script>
</body>
</html>
